site_name: yggdryl
site_description: One streaming byte-IO core (Io / compression / HTTP) for Rust, Python and Node — same code, near-Rust speed.
site_url: https://platob.github.io/yggdryl/
repo_url: https://github.com/Platob/yggdryl
repo_name: Platob/yggdryl
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    # Language tabs (=== "Python" / "Node" / "Rust") sync across the whole page and
    # persist the choice — pick a language once and every snippet follows.
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - toc.follow

# The docs tree mirrors the code tree (one page per concern / module) so code and
# documentation map 1:1 — see CLAUDE.md "Documentation".
nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Core:
      - Version: core/version.md
      - Media types (MIME): core/media.md
      - URI & URL: core/url.md
      - Byte IO (the Io trait): core/io.md
      - Compression: core/compression.md
  - HTTP:
      - Session & verbs: http/session.md
      - Request & Response: http/request-response.md
      - Streaming body: http/stream.md
      - Cookies: http/cookies.md
  - Saga (dataframe):
      - DataType: saga/datatype.md
      - Field: saga/field.md
      - Schema: saga/schema.md
      - Column (trait): saga/column.md
      - Frame (trait): saga/frame.md
      - Predicate & expressions: saga/predicate.md
  - Benchmarks: benchmarks.md

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Platob/yggdryl

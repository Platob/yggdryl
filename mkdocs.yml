site_name: yggdryl
site_description: An Apache Arrow-backed Rust library with Python and Node.js extensions.
site_url: https://platob.github.io/yggdryl/
repo_url: https://github.com/Platob/yggdryl
repo_name: Platob/yggdryl
copyright: Apache-2.0

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Guide:
      - Byte I/O: guide/io.md
      - URIs and URLs: guide/uri.md
      - Casting: guide/converter.md
      - Headers: guide/headers.md
  - Types:
      - Schema (DataType, Field): types/schema.md
      - Fixed-width: types/fixed.md
      - Variable-length: types/var.md
      - Nested (struct, list, map): types/nested.md
      - Decimals: types/decimal.md
      - Temporal: types/temporal.md
  - Arrow interop:
      - Overview: arrow/index.md
      - Primitives: arrow/primitives.md
      - Decimals: arrow/decimal.md
      - Temporal: arrow/temporal.md
      - Nested: arrow/nested.md
      - Metadata & round-tripping: arrow/metadata.md

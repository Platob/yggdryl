site_name: yggdryl
site_description: An Apache Arrow-backed Rust library with Python and Node.js extensions.
site_url: https://platob.github.io/yggdryl/
repo_url: https://github.com/Platob/yggdryl
repo_name: Platob/yggdryl
copyright: Apache-2.0

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - content.code.copy
    - content.tabs.link
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - The io layer:
      - Overview: io/index.md
      - URIs and URLs: io/uri.md
      - Byte I/O: io/bytes.md
      - Headers: io/headers.md
      - Schema (DataType, Field): io/schema.md
      - Navigation: io/navigation.md
      - Numerics & operations: io/ops.md
      - Casting: io/converter.md
  - Type families:
      - Fixed-width: io/fixed/index.md
      - Decimals: io/fixed/decimal.md
      - Temporal: io/fixed/temporal.md
      - Variable-length: io/var.md
      - Nested (struct, list, map): io/nested.md
  - Arrow interop:
      - Overview: io/arrow/index.md
      - Primitives: io/arrow/primitives.md
      - Decimals: io/arrow/decimal.md
      - Temporal: io/arrow/temporal.md
      - Nested: io/arrow/nested.md
      - Metadata & round-tripping: io/arrow/metadata.md

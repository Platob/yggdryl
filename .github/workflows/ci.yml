name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  core:
    name: Rust core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      # `cargo clippy --workspace` compiles the pyo3 binding's build script, which needs a
      # discoverable Python interpreter — setup-python puts one on PATH.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test

  python:
    name: Python extension (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Build & install (via the maturin build backend)
        run: uv pip install --system ./bindings/python pytest
      - name: Test
        run: uv run --no-project pytest bindings/python/tests

  node:
    name: Node extension (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

  docs:
    name: Docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v5
      - name: Install MkDocs
        run: uv pip install --system mkdocs-material
      # `--strict` fails the build on any warning (a broken link, a page missing from nav),
      # so the published site never drifts from the docs in the tree.
      - name: Build
        run: uv run --no-project mkdocs build --strict

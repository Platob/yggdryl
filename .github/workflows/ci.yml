name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  core:
    name: Rust core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (yggdryl-io, all features)
        run: cargo clippy -p yggdryl-io --all-targets --all-features -- -D warnings
      - name: Clippy (yggdryl-compression, all features)
        run: cargo clippy -p yggdryl-compression --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test
      - name: Test (yggdryl-io, all features)
        run: cargo test -p yggdryl-io --all-features
      - name: Test (yggdryl-compression, all features)
        run: cargo test -p yggdryl-compression --all-features

  python:
    name: Python extension (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build & install (via maturin build backend)
        run: pip install ./bindings/python pytest
      - name: Test
        run: pytest bindings/python/tests

  node:
    name: Node extension (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

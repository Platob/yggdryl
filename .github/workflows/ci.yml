name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  core:
    name: Rust core (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      # The bindings build zlib-ng (the `gzip-zlib-ng` feature) via CMake + Ninja,
      # exercised by the `--workspace` / `--all-features` steps below.
      - name: Build deps (CMake, Ninja)
        run: python scripts/setup-build-deps.py
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy -p yggdryl-core --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test
      - name: Test (all features)
        run: cargo test -p yggdryl-core --all-features

  python:
    name: Python extension (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Build deps (CMake, Ninja for zlib-ng)
        run: python scripts/setup-build-deps.py
      - name: Build & install (via maturin build backend)
        run: uv pip install --system ./bindings/python pytest
      - name: Test
        run: uv run --no-project pytest bindings/python/tests

  node:
    name: Node extension (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - name: Build deps (CMake, Ninja for zlib-ng)
        run: python ../../scripts/setup-build-deps.py
      - name: Install deps
        run: npm install
      - name: Build
        run: npm run build
      - name: Test
        run: npm test

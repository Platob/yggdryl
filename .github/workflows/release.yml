name: Release

# Push to `main`: the `check` job reads the workspace version (the single source
# of truth, `[workspace.package].version` in the root Cargo.toml) and looks for a
# matching `v<version>` git tag. If the tag is absent the version was bumped, so
# the workflow builds, runs the gate, publishes to all three registries, and then
# creates the tag and a GitHub Release. If the tag already exists nothing runs
# beyond `check`. `workflow_dispatch` behaves the same (handy to retry a bump).
#
# To cut a release: bump `version` under `[workspace.package]` and push to main.
# crates.io and the Python wheels inherit it (`version.workspace = true`); the npm
# package.json is synced from it at publish time. Inter-crate deps are caret
# ranges, so only the workspace version needs changing for a 0.1.x bump.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CARGO_REGISTRY_TOKEN  crates.io API token  (Rust crates)
#   PYPI_API_TOKEN        PyPI API token       (Python wheels)
#   NPM_TOKEN             npm automation token (Node addon)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create the tag + GitHub Release

jobs:
  # ---------------------------------------------------- version-bump gate ----
  check:
    name: Detect version bump
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          set -euo pipefail
          # Read [workspace.package].version from the root Cargo.toml.
          VERSION=$(sed -n '/^\[workspace.package\]/,/^\[/{ s/^version *= *"\([^"]*\)".*/\1/p }' Cargo.toml | head -1)
          test -n "$VERSION"
          echo "Workspace version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if git ls-remote --exit-code --tags origin "refs/tags/v$VERSION" >/dev/null 2>&1; then
            echo "Tag v$VERSION already exists — nothing to release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No tag v$VERSION — this is a new release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  # ----------------------------------------------------------------- gate ----
  test:
    name: Test gate
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test

  # ---------------------------------------------------------------- build ----
  wheels:
    name: Python wheel (${{ matrix.os }})
    needs: check
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path bindings/python/Cargo.toml
      - name: Build sdist (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.os }}
          path: dist/*

  addons:
    name: Node addon (${{ matrix.os }})
    needs: check
    if: needs.check.outputs.should_release == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build addon
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.os }}
          path: |
            bindings/node/*.node
            bindings/node/index.js
            bindings/node/index.d.ts

  # -------------------------------------------------------------- publish ----
  publish-crate:
    name: Publish to crates.io
    needs: [check, test]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish (in dependency order)
        run: |
          cargo publish -p yggdryl-core
          cargo publish -p yggdryl-version
          cargo publish -p yggdryl-media
          cargo publish -p yggdryl-url
          cargo publish -p yggdryl-io
          cargo publish -p yggdryl-compression
          cargo publish -p yggdryl-http
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [check, test, wheels]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-npm:
    name: Publish to npm
    needs: [check, test, addons]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Sync package.json to the workspace version
        run: npm version "${{ needs.check.outputs.version }}" --no-git-tag-version --allow-same-version
      - name: Collect built addons
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: bindings/node
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ------------------------------------------------------ tag + release ----
  release:
    name: Tag and GitHub Release
    needs: [check, publish-crate, publish-pypi, publish-npm]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create tag v${{ needs.check.outputs.version }} and release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.check.outputs.version }}" \
            --target "${{ github.sha }}" \
            --title "v${{ needs.check.outputs.version }}" \
            --generate-notes

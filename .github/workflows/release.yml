name: Build artifacts

# Builds the platform-specific artifacts for Linux and Windows:
#   - Python wheels (maturin)
#   - Node native addons (.node, via napi)
# The pure-Rust crate is published from source with `cargo publish` and needs no
# per-platform build, so it is not part of this matrix.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  wheels:
    name: Python wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: dist/*.whl

  addons:
    name: Node addon (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build addon
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: node-addon-${{ matrix.os }}
          path: bindings/node/*.node

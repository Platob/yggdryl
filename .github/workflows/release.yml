name: Release

# Pushing a version tag (e.g. `v0.1.0`) builds the per-OS artifacts and then
# publishes to all three registries. `workflow_dispatch` runs the build only, so
# you can dry-run the artifacts without publishing.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CARGO_REGISTRY_TOKEN  crates.io API token  (Rust core crate)
#   PYPI_API_TOKEN        PyPI API token       (Python wheels)
#   NPM_TOKEN             npm automation token (Node addon)
#
# The pure-Rust crate is portable source, so it publishes from a single job;
# the Python wheels and Node addons are built per-OS for Linux and Windows.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------- build ----
  wheels:
    name: Python wheel (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --manifest-path bindings/python/Cargo.toml
      - name: Build sdist (Linux only)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path bindings/python/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.os }}
          path: dist/*

  addons:
    name: Node addon (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
      - name: Build addon
        run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.os }}
          path: |
            bindings/node/*.node
            bindings/node/index.js
            bindings/node/index.d.ts

  # -------------------------------------------------------------- publish ----
  publish-crate:
    name: Publish to crates.io
    needs: [wheels, addons]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo publish
        run: cargo publish -p yggdryl
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [wheels, addons]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true

  publish-npm:
    name: Publish to npm
    needs: [wheels, addons]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Collect built addons
        uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
          path: bindings/node
      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

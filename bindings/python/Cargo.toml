[package]
name = "yggdryl-python"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Python extension for yggdryl, backed by the Rust core"
publish = false

[lib]
# The compiled artifact is imported from Python as `yggdryl`.
name = "yggdryl"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# The consolidated core provides every value type (Version, MimeType/MediaType,
# Uri/Url), the BytesIO / LocalPath byte-IO handles and the Compression codec —
# with mmap, media, json and all compression backends enabled.
yggdryl-core = { path = "../../crates/yggdryl-core", version = "0.1.0", features = ["mmap", "media", "json"] }
yggdryl-http = { path = "../../crates/yggdryl-http", version = "0.1.0", features = ["compression", "media"] }
# Converts the `serde_json::Value` from `Io::json()` into Python objects.
serde_json = "1"

[dependencies.pyo3]
version = "0.22"
features = ["extension-module"]

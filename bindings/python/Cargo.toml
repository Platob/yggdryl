[package]
name = "yggdryl-python"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Python extension for yggdryl, backed by the Rust core"
publish = false

[lib]
# The compiled artifact is imported from Python as `yggdryl`.
name = "yggdryl"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# The dependency-light Rust core; all logic lives here.
yggdryl-core = { workspace = true }
yggdryl-dtype = { workspace = true }
yggdryl-field = { workspace = true }
yggdryl-scalar = { workspace = true }

[dependencies.pyo3]
version = "0.22"
# `abi3-py37` builds against the stable ABI (the limited API), so a single wheel
# (`cp37-abi3`) is forward-compatible with every CPython from 3.7 up — one build
# per OS/arch instead of one per interpreter version.
features = ["extension-module", "abi3-py37"]

[package]
name = "yggdryl-python"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Python extension for yggdryl, backed by the Rust core"
publish = false

[lib]
# The compiled artifact is imported from Python as `yggdryl`.
name = "yggdryl"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# yggdryl-url re-exports everything from yggdryl-core, so this is the only
# yggdryl dependency the binding needs.
yggdryl-url = { path = "../../crates/yggdryl-url", version = "0.1.0" }

[dependencies.pyo3]
version = "0.22"
features = ["extension-module"]

[package]
name = "yggdryl-python"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Python extension for yggdryl, backed by the Rust core"
publish = false

[lib]
# The compiled artifact is imported from Python as `yggdryl`.
name = "yggdryl"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# The consolidated core provides every value type (Version, MimeType/MediaType,
# Uri/Url), the BytesIO / LocalPath byte-IO handles and the Compression codec —
# with mmap, media, json and all compression backends enabled.
yggdryl-core = { path = "../../crates/yggdryl-core", version = "0.1.0", features = ["mmap", "media", "json", "serde"] }
yggdryl-http = { path = "../../crates/yggdryl-http", version = "0.1.0", features = ["compression", "media"] }
# The schema layer (DataType / Field) with JSON (de)serialisation and Arrow conversion.
yggdryl-schema = { path = "../../crates/yggdryl-schema", version = "0.1.0", features = ["json", "arrow"] }
# The Arrow-backed columnar layer (Serie) — typed columns over every DataType.
yggdryl-serie = { path = "../../crates/yggdryl-serie", version = "0.1.0" }
yggdryl-scalar = { path = "../../crates/yggdryl-scalar", version = "0.1.0" }
# Converts the `serde_json::Value` from `Io::json()` into Python objects.
serde_json = "1"

[dependencies.pyo3]
version = "0.22"
# `abi3-py37` builds against the stable ABI (the limited API), so a single wheel
# (`cp37-abi3`) is forward-compatible with every CPython from 3.7 up — one build
# per OS/arch instead of one per interpreter version.
features = ["extension-module", "abi3-py37"]

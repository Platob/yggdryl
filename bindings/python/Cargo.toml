[package]
name = "yggdryl-python"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Python extension for yggdryl, backed by the Rust core"
publish = false

[lib]
# The compiled artifact is imported from Python as `yggdryl`.
name = "yggdryl"
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# The foundations: Buffer, the Io / Whence byte abstraction, Charset, the global
# JsonParams + the Jsonable trait, and the shared error types.
yggdryl-core = { path = "../../crates/yggdryl-core", version = "0.1.0", features = ["mmap", "media", "json", "serde"] }
# The Arrow-centric type layers built on the core — data types, scalar values and
# fields — with JSON (de)serialisation enabled.
yggdryl-dtype = { path = "../../crates/yggdryl-dtype", version = "0.1.0", features = ["json"] }
yggdryl-scalar = { path = "../../crates/yggdryl-scalar", version = "0.1.0", features = ["json"] }
yggdryl-field = { path = "../../crates/yggdryl-field", version = "0.1.0", features = ["json"] }
# Converts the `serde_json::Value` from `Io::json()` into Python objects.
serde_json = "1"

[dependencies.pyo3]
version = "0.22"
# `abi3-py37` builds against the stable ABI (the limited API), so a single wheel
# (`cp37-abi3`) is forward-compatible with every CPython from 3.7 up — one build
# per OS/arch instead of one per interpreter version.
features = ["extension-module", "abi3-py37"]

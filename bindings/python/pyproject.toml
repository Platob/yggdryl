[build-system]
requires = ["maturin>=1.7,<2.0"]
build-backend = "maturin"

[project]
name = "yggdryl"
version = "0.1.0"
description = "yggdryl — a Rust-core URI/URL library, exposed to Python"
readme = "README.md"
requires-python = ">=3.8"
license = { text = "Apache-2.0" }
authors = [{ name = "yggdryl contributors" }]
keywords = ["uri", "url", "parser", "rust", "yggdryl"]
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: 3",
    "License :: OSI Approved :: Apache Software License",
]

[project.urls]
Homepage = "https://github.com/Platob/yggdryl"
Repository = "https://github.com/Platob/yggdryl"

[project.optional-dependencies]
test = ["pytest>=7.0"]

[tool.maturin]
# Build the crate in this directory and name the wheel `yggdryl`.
manifest-path = "Cargo.toml"
module-name = "yggdryl"
strip = true

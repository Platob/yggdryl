[package]
name = "yggdryl-node"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Node.js extension for yggdryl, backed by the Rust core"
publish = false

[lib]
# Leave the lib name as the default (`yggdryl_node`) so the napi CLI finds the
# compiled artifact; the import name (`yggdryl`) comes from `napi.name` in
# package.json, which produces `yggdryl.<triple>.node`.
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# The foundations: Buffer, the Io / Whence byte abstraction, Charset, the global
# JsonParams + the Jsonable trait, and the shared error types.
yggdryl-core = { path = "../../crates/yggdryl-core", version = "0.1.0", features = ["mmap", "media", "json", "serde"] }
# The Arrow-centric type layers built on the core — data types, scalar values and
# fields — with JSON (de)serialisation enabled.
yggdryl-dtype = { path = "../../crates/yggdryl-dtype", version = "0.1.0", features = ["json"] }
yggdryl-scalar = { path = "../../crates/yggdryl-scalar", version = "0.1.0", features = ["json"] }
yggdryl-field = { path = "../../crates/yggdryl-field", version = "0.1.0", features = ["json"] }
# `serde-json` lets `Io::json()`'s `serde_json::Value` cross to JS as an object.
napi = { version = "2", default-features = false, features = ["napi8", "serde-json"] }
napi-derive = "2"
serde_json = "1"

[build-dependencies]
napi-build = "2"

[package]
name = "yggdryl-node"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Node.js extension for yggdryl, backed by the Rust core"
publish = false

[lib]
# Leave the lib name as the default (`yggdryl_node`) so the napi CLI finds the
# compiled artifact; the import name (`yggdryl`) comes from `napi.name` in
# package.json, which produces `yggdryl.<triple>.node`.
crate-type = ["cdylib"]
path = "src/lib.rs"

[dependencies]
# The core crate is named `yggdryl`; alias it to `yggdryl-core` for a stable
# extern name (`yggdryl_core`) across the bindings.
yggdryl-core = { package = "yggdryl", path = "../../crates/yggdryl", version = "0.1.0" }
napi = { version = "2", default-features = false, features = ["napi8"] }
napi-derive = "2"

[build-dependencies]
napi-build = "2"

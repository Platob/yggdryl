[workspace]
resolver = "2"
members = [
    "crates/yggdryl-core",
    "crates/yggdryl-version",
    "crates/yggdryl-media",
    "crates/yggdryl-url",
    "bindings/python",
    "bindings/node",
]
# `cargo build` / `cargo test` with no args only touches the pure-Rust crates.
# The Python and Node bindings are built through their own toolchains
# (maturin / napi) so the default workflow never needs Python or Node headers.
default-members = [
    "crates/yggdryl-core",
    "crates/yggdryl-version",
    "crates/yggdryl-media",
    "crates/yggdryl-url",
]

[workspace.package]
version = "0.1.1"
edition = "2021"
license = "Apache-2.0"
authors = ["yggdryl contributors"]
repository = "https://github.com/Platob/yggdryl"
homepage = "https://github.com/Platob/yggdryl"
description = "yggdryl — a Rust-core URI/URL library with Python and Node extensions"
keywords = ["uri", "url", "parser", "ffi", "yggdryl"]

[workspace.dependencies]
yggdryl-core = { path = "crates/yggdryl-core", version = "0.1.0" }
yggdryl-version = { path = "crates/yggdryl-version", version = "0.1.0" }
yggdryl-media = { path = "crates/yggdryl-media", version = "0.1.0" }
yggdryl-url = { path = "crates/yggdryl-url", version = "0.1.0" }

[profile.release]
lto = true
codegen-units = 1
strip = true

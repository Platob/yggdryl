[workspace]
resolver = "2"
members = [
    "crates/yggdryl-core",
    "crates/yggdryl-schema",
    "crates/yggdryl-scalar",
    "crates/yggdryl-array",
    "bindings/python",
    "bindings/node",
]
# `cargo build` / `cargo test` with no args only touches the pure-Rust crates.
# The Python and Node bindings are built through their own toolchains
# (maturin / napi) so the default workflow never needs Python or Node headers.
default-members = [
    "crates/yggdryl-core",
    "crates/yggdryl-schema",
    "crates/yggdryl-scalar",
    "crates/yggdryl-array",
]

[workspace.package]
version = "0.1.1"
edition = "2021"
license = "Apache-2.0"
authors = ["yggdryl contributors"]
repository = "https://github.com/Platob/yggdryl"
homepage = "https://github.com/Platob/yggdryl"
description = "yggdryl — Arrow-backboned data toolkit: a zero-copy Rust core with identical Python and Node APIs, for lazy manipulation of huge data volumes across sources"
keywords = ["arrow", "dataframe", "zero-copy", "ffi", "yggdryl"]

[workspace.dependencies]
yggdryl-core = { path = "crates/yggdryl-core", version = "0.1.0", default-features = false }
yggdryl-schema = { path = "crates/yggdryl-schema", version = "0.1.1", default-features = false }
yggdryl-scalar = { path = "crates/yggdryl-scalar", version = "0.1.1", default-features = false }
# Arrow subset crates only — never the `arrow` umbrella. `arrow-schema` is the
# interop vocabulary every `to_arrow` / `from_arrow` targets; `arrow-buffer`
# supplies `i256`, the native value type behind `Decimal256`.
arrow-schema = { version = "59", default-features = false }
arrow-buffer = { version = "59", default-features = false }

[profile.release]
lto = true
codegen-units = 1
strip = true

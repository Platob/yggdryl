[workspace]
resolver = "2"
members = [
    "crates/yggdryl-core",
    "crates/yggdryl-dtype",
    "crates/yggdryl-scalar",
    "crates/yggdryl-field",
    "bindings/python",
    "bindings/node",
]
# `cargo build` / `cargo test` with no args only touches the pure-Rust crates.
# The Python and Node bindings are built through their own toolchains
# (maturin / napi) so the default workflow never needs Python or Node headers.
default-members = [
    "crates/yggdryl-core",
    "crates/yggdryl-dtype",
    "crates/yggdryl-scalar",
    "crates/yggdryl-field",
]

[workspace.package]
version = "0.1.1"
edition = "2021"
license = "Apache-2.0"
authors = ["yggdryl contributors"]
repository = "https://github.com/Platob/yggdryl"
homepage = "https://github.com/Platob/yggdryl"
description = "yggdryl — a Rust-core URI/URL library with Python and Node extensions"
keywords = ["uri", "url", "parser", "ffi", "yggdryl"]

[workspace.dependencies]
yggdryl-core = { path = "crates/yggdryl-core", version = "0.1.0", default-features = false }
yggdryl-dtype = { path = "crates/yggdryl-dtype", version = "0.1.0", default-features = false }
yggdryl-scalar = { path = "crates/yggdryl-scalar", version = "0.1.0", default-features = false }
yggdryl-field = { path = "crates/yggdryl-field", version = "0.1.0", default-features = false }

[profile.release]
lto = true
codegen-units = 1
strip = true

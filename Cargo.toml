[workspace]
resolver = "2"
members = [
    "crates/yggdryl",
    "bindings/python",
    "bindings/node",
]
# `cargo build` / `cargo test` with no args only touches the pure-Rust core.
# The Python and Node bindings are built through their own toolchains
# (maturin / napi) so the default workflow never needs Python or Node headers.
default-members = ["crates/yggdryl"]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"
authors = ["yggdryl contributors"]
repository = "https://github.com/Platob/yggdryl"
homepage = "https://github.com/Platob/yggdryl"
description = "yggdryl — a Rust-core hierarchical tree library with Python and Node extensions"
keywords = ["tree", "hierarchy", "ffi", "yggdryl"]

[workspace.dependencies]
# The Rust core crate. Bindings depend on it under the alias `yggdryl-core`
# (see each binding's Cargo.toml) so the dependency's extern name doesn't collide
# with the cdylib they themselves expose as `yggdryl`.
yggdryl = { path = "crates/yggdryl", version = "0.1.0" }
# Apache Arrow is the principal data dependency of the core: the tree exchanges
# its contents as columnar Arrow record batches.
arrow = "59"

[profile.release]
lto = true
codegen-units = 1
strip = true

[workspace]
resolver = "2"
members = [
    "crates/yggdryl-core",
    "crates/yggdryl-dtype",
    "crates/yggdryl-field",
    "crates/yggdryl-scalar",
    "bindings/python",
    "bindings/node",
]
# `cargo build` / `cargo test` with no args only touches the pure-Rust core.
# The Python and Node bindings are built through their own toolchains
# (maturin / napi) so the default workflow never needs Python or Node headers.
default-members = [
    "crates/yggdryl-core",
    "crates/yggdryl-dtype",
    "crates/yggdryl-field",
    "crates/yggdryl-scalar",
]

[workspace.package]
version = "0.1.1"
edition = "2021"
license = "Apache-2.0"
authors = ["yggdryl contributors"]
repository = "https://github.com/Platob/yggdryl"
homepage = "https://github.com/Platob/yggdryl"
description = "yggdryl — a Rust-core URI/URL library with Python and Node extensions"
keywords = ["uri", "url", "parser", "ffi", "yggdryl"]

[workspace.dependencies]
yggdryl-core = { path = "crates/yggdryl-core", version = "0.1.0", default-features = false }
yggdryl-dtype = { path = "crates/yggdryl-dtype", version = "0.1.0", default-features = false }
yggdryl-field = { path = "crates/yggdryl-field", version = "0.1.0", default-features = false }
yggdryl-scalar = { path = "crates/yggdryl-scalar", version = "0.1.0", default-features = false }
# Apache Arrow subset crates only (never the `arrow` umbrella): the data layer's
# `to_arrow` / `from_arrow` interop targets `arrow-schema` types (DataType, Field)
# and `arrow-array` arrays (a scalar is a one-element array).
arrow-schema = { version = "59.0.0", default-features = false }
arrow-array = { version = "59.0.0", default-features = false }
arrow-buffer = { version = "59.0.0", default-features = false }
arrow-select = { version = "59.0.0", default-features = false }
# `half::f16` is Apache Arrow's native element for the `float16` type (arrow-array's
# `Float16Array` is `PrimitiveArray<Float16Type>` over it); already in the tree via
# arrow, promoted to a direct dep so the `float16` data type / scalar can name it.
half = { version = "2.7.1", default-features = false }

[profile.release]
lto = true
codegen-units = 1
strip = true

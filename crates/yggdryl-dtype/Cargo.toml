[package]
name = "yggdryl-dtype"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Arrow-centric data types for yggdryl: the DataType trait hierarchy and the BinaryType / Utf8Type descriptors"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_dtype"
path = "src/lib.rs"

[dependencies]
# The foundations: error types, the component-map codec and the Jsonable trait.
yggdryl-core = { workspace = true, default-features = false }
# All heavy dependencies are optional and off by default (mirroring the core):
#   log    structured logging via the `log` facade;
#   serde  `Serialize` / `Deserialize` for every type (canonical-string based);
#   json   the `Jsonable` JSON/BSON surface (implies `serde`).
log = { version = "0.4", optional = true }
serde = { version = "1", optional = true, features = ["derive"] }

[dev-dependencies]
# Round-trip the `serde` impls through a concrete format in the tests.
serde_json = { version = "1" }

[features]
default = []
log = ["dep:log", "yggdryl-core/log"]
serde = ["dep:serde", "yggdryl-core/serde"]
json = ["serde", "yggdryl-core/json"]

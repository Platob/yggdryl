[package]
name = "yggdryl-scalar"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Arrow-centric scalar values for yggdryl: byte-backed values carrying their schema data type"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_scalar"
path = "src/lib.rs"

[dependencies]
# The schema layer supplies the `DataType` the scalars carry.
yggdryl-schema = { workspace = true, default-features = false }
# All off by default, mirroring the other crates.
log = { version = "0.4", optional = true }
serde = { version = "1", optional = true, features = ["derive"] }

[dev-dependencies]
# Round-trip the `serde` impls through a concrete format in the tests.
serde_json = { version = "1" }

[features]
default = []
# Structured logging via the `log` facade (e.g. when a value is truncated to its
# type's maximum byte size), also turning it on in the schema layer.
log = ["dep:log", "yggdryl-schema/log"]
# Structural `Serialize` / `Deserialize` for every value type; also turns on the
# schema layer's `serde` so the carried data types serialize.
serde = ["dep:serde", "yggdryl-schema/serde"]

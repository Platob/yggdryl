[package]
name = "yggdryl-scalar"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Arrow-centric scalar values for yggdryl: the in-memory Binary buffer (which implements Io) and the validated Utf8 string value"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_scalar"
path = "src/lib.rs"

[dependencies]
# The foundations (Buffer, Io/Whence, errors, the mapping codec, Jsonable) and the
# data-type descriptors the scalars carry and cast between.
yggdryl-core = { workspace = true, default-features = false }
yggdryl-dtype = { workspace = true, default-features = false }
# All heavy dependencies are optional and off by default (mirroring the core).
log = { version = "0.4", optional = true }
serde = { version = "1", optional = true, features = ["derive"] }

[dev-dependencies]
# Round-trip the `serde` impls through a concrete format, and exercise the
# cross-cutting JSON surface against fields.
serde_json = { version = "1" }
yggdryl-field = { workspace = true, features = ["json"] }

[features]
default = []
log = ["dep:log", "yggdryl-core/log", "yggdryl-dtype/log"]
serde = ["dep:serde", "yggdryl-core/serde", "yggdryl-dtype/serde"]
json = ["serde", "yggdryl-core/json", "yggdryl-dtype/json"]

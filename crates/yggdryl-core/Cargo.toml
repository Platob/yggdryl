[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Dependency-light foundations for yggdryl"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

[dependencies]
# Structured logging via the `log` facade, off by default so the crate stays
# dependency-free; emitted only through the crate-local `log_event!` macro.
log = { version = "0.4", optional = true }

[features]
log = ["dep:log"]

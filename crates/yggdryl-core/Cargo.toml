[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Dependency-light foundations for yggdryl: the zero-copy Buffer, the Io byte abstraction, Charset encodings, the Jsonable JSON/BSON trait, and the shared error and mapping types"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

[dependencies]
# All heavy dependencies are optional and off by default (except the compression
# codec backends, on by `default`):
#   log    structured logging via the `log` facade;
#   mmap   memory-mapped, zero-copy local files in `LocalPath` (memmap2);
#   json   `Io::json()` — a zero-copy parse of a handle's bytes (serde_json);
#   serde  `Serialize` / `Deserialize` for every value type (string-based);
#   gzip / zstd / snappy / brotli   the matching streamed compression backend.
log = { version = "0.4", optional = true }
memmap2 = { version = "0.9", optional = true }
serde = { version = "1", optional = true, features = ["derive"] }
serde_json = { version = "1", optional = true }
# `zlib-rs` is the pure-Rust zlib-rs backend (via `libz-rs-sys`): near-native
# deflate/inflate throughput, ~3x faster compress than the default `miniz_oxide`
# and matching C zlib on decompress, with no C compiler / cmake build dependency
# (so the wheels / npm builds stay pure-Rust). `default-features = false` drops the
# slower `miniz_oxide` backend.
flate2 = { version = "1", optional = true, default-features = false, features = ["zlib-rs"] }
zstd = { version = "0.13", optional = true }
snap = { version = "1", optional = true }
brotli = { version = "7", optional = true }

[dev-dependencies]
# Round-trip the `serde` impls through a concrete format in the tests.
serde_json = { version = "1" }

[features]
# The common compression codecs ship on by default; opt out with
# `default-features = false` for a codec-free build (each variant then parses and
# names itself but reports `Unsupported` on encode/decode).
default = ["gzip", "zstd", "snappy", "brotli"]
log = ["dep:log"]
mmap = ["dep:memmap2"]
# The `media` module is always compiled (the URL types reference it
# unconditionally, no extra dependency); this feature only gates the
# `media_type()` / `from_mime` / `from_media` / `from_stats` accessors on the
# `Io` / `Path` / compression layers.
media = []
json = ["serde", "dep:serde_json"]
# `Serialize` / `Deserialize` for every value type. Each renders to its canonical
# string (a `Url` is `"https://…"`, a `MimeType` is `"image/png"`); the plain
# enums / structs (`Mode`, `Whence`, `Kind`, `IoStats`, `Signature`) derive.
serde = ["dep:serde"]
gzip = ["dep:flate2"]
zstd = ["dep:zstd"]
snappy = ["dep:snap"]
brotli = ["dep:brotli"]

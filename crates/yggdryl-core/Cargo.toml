[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "yggdryl's generic foundation — wide integers and the byte-codec base traits"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

[dependencies]
# Apache Arrow's buffer subset — the wide `i256` is Arrow's own 256-bit integer, so
# `arrow-buffer` backs the native integer types. This is core's only dependency: it is
# the generic base (native number types + `Encoder`/`Decoder` byte-codec traits +
# `PrimitiveType`) that `buffer`, `compression`, `converter`, and `dtype` build on.
arrow-buffer = { workspace = true }

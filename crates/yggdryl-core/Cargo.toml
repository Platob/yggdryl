[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "yggdryl core — the Arrow-backed foundation"
keywords.workspace = true

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

# Dependency-free time+memory benchmarks (their own counting allocator, plain `main`).
[[bench]]
name = "io_memory_heap"
harness = false

[[bench]]
name = "io_memory_mmap"
harness = false

[[bench]]
name = "uri"
harness = false

[dependencies]
# Dependency-free: the reset core is just the abstract memory-access traits (with an in-heap
# `Heap` source) and the RFC 3986 URI/URL family — both built on `std` alone. Other sources
# (mmap, …) and the typed data layer are (re)built here against the same `memory` traits.

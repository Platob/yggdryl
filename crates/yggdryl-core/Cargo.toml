[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Dependency-light foundations for yggdryl"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

[dependencies]
# All optional so the crate stays dependency-free by default:
#   log         structured logging via the `log` facade (the `log_event!` macro);
#   serde       `Serialize` / `Deserialize` bounds for the `Base` trait;
#   serde_json  JSON (de)serialization behind `Base` (the `json` feature).
log = { version = "0.4", optional = true }
serde = { version = "1", optional = true }
serde_json = { version = "1", optional = true }

[dev-dependencies]
# Example value types in tests and doctests derive `Serialize` / `Deserialize`.
serde = { version = "1", features = ["derive"] }
# Benchmark harness for the buffer benches (stable Rust has no built-in bencher).
criterion = "0.5"

[features]
log = ["dep:log"]
serde = ["dep:serde"]
# JSON serialization for the `Base` trait; pulls in `serde` and `serde_json`.
json = ["serde", "dep:serde_json"]

[[bench]]
name = "buffers"
harness = false

[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "yggdryl core — the Arrow-backed foundation"
keywords.workspace = true

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

# Dependency-free time+memory benchmark (its own counting allocator, plain `main`).
[[bench]]
name = "uri"
harness = false

[dependencies]
# Apache Arrow's buffer subset — the physical layer the foundation is built on.
arrow-buffer = { workspace = true }

[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Dependency-light foundations for yggdryl"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

[dependencies]
# Both off by default so the crate stays dependency-free:
#   log    structured logging via the `log` facade (the `log_event!` macro);
#   serde  content-based `Serialize` / `Deserialize` for the value types.
log = { version = "0.4", optional = true }
serde = { version = "1", optional = true }

[dev-dependencies]
# Round-trip the hand-rolled `serde` impls through a concrete format in the tests.
serde_json = { version = "1" }

[features]
log = ["dep:log"]
serde = ["dep:serde"]

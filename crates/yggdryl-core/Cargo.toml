[package]
name = "yggdryl-core"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "yggdryl core — the Arrow-backed foundation"
keywords.workspace = true

[lib]
name = "yggdryl_core"
path = "src/lib.rs"

# Dependency-free time+memory benchmarks (their own counting allocator, plain `main`).
[[bench]]
name = "uri"
harness = false

[[bench]]
name = "bytes"
harness = false

[[bench]]
name = "fixed"
harness = false

[[bench]]
name = "var"
harness = false

[[bench]]
name = "numerics"
harness = false

[[bench]]
name = "decimal"
harness = false

[[bench]]
name = "access"
harness = false

[[bench]]
name = "temporal"
harness = false

[[bench]]
name = "converter"
harness = false

[[bench]]
name = "headers"
harness = false

[[bench]]
name = "nested"
harness = false

[[bench]]
name = "arrow"
harness = false
required-features = ["arrow"]

[features]
default = []
# Zero-copy interop with the wider Apache Arrow ecosystem (arrays + schema). Off by default
# so the core stays minimal (only `arrow-buffer`); enable for `to_arrow` / `from_arrow`.
arrow = ["dep:arrow-array", "dep:arrow-schema", "dep:arrow-data"]

[dependencies]
# Apache Arrow's buffer subset — the physical layer the foundation is built on.
arrow-buffer = { workspace = true }
# IEEE-754 half-precision float — the value type behind `f16` (unified with arrow-buffer's half).
half = { workspace = true }
# Optional: Arrow arrays + schema, for the zero-copy interop behind the `arrow` feature.
arrow-array = { workspace = true, optional = true }
arrow-schema = { workspace = true, optional = true }
arrow-data = { workspace = true, optional = true }
# Temporal calendar + full IANA timezone database (implementation detail of `io::fixed::temporal`).
chrono = { workspace = true }
chrono-tz = { workspace = true }

# Test-only: the `io_arrow` interop tests (compiled under `--features arrow`) construct and
# inspect Arrow types directly, so the integration-test crate needs them in scope.
[dev-dependencies]
arrow-buffer = { workspace = true }
arrow-array = { workspace = true }
arrow-schema = { workspace = true }
arrow-data = { workspace = true }

[package]
name = "yggdryl-http"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Blocking HTTP client (session/request/response, requests-like) that streams bodies over the yggdryl-core byte-IO abstraction"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_http"
path = "src/lib.rs"

[[bench]]
name = "http"
harness = false

[dependencies]
# The consolidated core: the byte-IO foundation (a response body is a
# `Box<dyn Io>` — a seekable `HttpStream` when streamed, a `BytesIO` when
# buffered), the shared `Url`/`Uri` types and, under feature flags, the media
# types and streamed compression. `json` lights up `Io::json()` on every handle.
yggdryl-core = { workspace = true, default-features = false, features = ["json"] }
# The blocking HTTP transport. `rustls` gives TLS; ureq's own gzip/brotli are
# left off so decompression goes through `yggdryl-core`'s compression codecs.
ureq = { version = "3", default-features = false, features = ["rustls"] }
# Optional and off by default:
#   compression  auto-decode a `Content-Encoding` body via yggdryl-core's codecs;
#   media        expose the response `mime_type()` via yggdryl-core's media types;
#   serde        `Serialize`/`Deserialize` for the data types (Method, HttpVersion,
#                headers, cookies, retry config) and, transitively, the core types;
#   log          structured logging via the `log` facade.
serde = { version = "1", optional = true, features = ["derive"] }
log = { version = "0.4", optional = true }

[features]
# `compression` (auto `Content-Encoding` decode) ships on by default so a plain
# `get()` transparently decompresses, like `requests`; opt out with
# `default-features = false`.
default = ["compression"]
# Enabling `compression` turns on the gzip/zstd/snappy backends too, so a
# `Content-Encoding` response actually decodes.
compression = [
    "yggdryl-core/gzip",
    "yggdryl-core/zstd",
    "yggdryl-core/snappy",
]
media = ["yggdryl-core/media"]
# `serde` also turns on the core's `serde` feature, so the embedded value types
# (`Url`, `Method` strings, …) serialise too. A live request/response body streams
# off a connection and is deliberately not serialisable.
serde = ["dep:serde", "yggdryl-core/serde"]
# Reserved (inert) placeholders for the forthcoming async HTTP/2 (`h2`) and HTTP/3
# (`h3` over QUIC) transports. They gate no code yet, so enabling one has no effect:
# `HttpVersion::Http2`/`Http3` parse and name themselves but stay unavailable until
# the transport itself is implemented (not merely until the flag is set).
http2 = []
http3 = []
log = ["dep:log", "yggdryl-core/log"]

[dev-dependencies]
# Round-trip the `serde` impls through a concrete format in the tests.
serde_json = { version = "1" }

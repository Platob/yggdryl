[package]
name = "yggdryl-http"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Blocking HTTP client (session/request/response, requests-like) that streams bodies over the yggdryl-core byte-IO abstraction"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_http"
path = "src/lib.rs"

[[bench]]
name = "http"
harness = false

[dependencies]
# The consolidated core: the byte-IO foundation (a response body is a
# `Box<dyn Io>` â€” a seekable `HttpStream` when streamed, a `BytesIO` when
# buffered), the shared `Url`/`Uri` types and, under feature flags, the media
# types and streamed compression. `json` lights up `Io::json()` on every handle.
yggdryl-core = { workspace = true, default-features = false, features = ["json"] }
# The blocking HTTP transport. `rustls` gives TLS; ureq's own gzip/brotli are
# left off so decompression goes through `yggdryl-core`'s compression codecs.
ureq = { version = "3", default-features = false, features = ["rustls"] }
# Optional and off by default:
#   compression  auto-decode a `Content-Encoding` body via yggdryl-core's codecs;
#   media        expose the response `mime_type()` via yggdryl-core's media types;
#   serde        `Serialize`/`Deserialize` for the data types (Method, HttpVersion,
#                headers, cookies, retry config) and, transitively, the core types;
#   log          structured logging via the `log` facade.
serde = { version = "1", optional = true, features = ["derive"] }
log = { version = "0.4", optional = true }
# The optional async transport for HTTP/2 (the `http2` feature). hyper speaks the
# h2 protocol over a small current-thread tokio runtime; tokio-rustls gives TLS
# with ALPN so an `https` request negotiates `h2` (falling back to `http/1.1`),
# while a cleartext `http` request uses h2c (prior knowledge). Compiled only when
# `http2` is enabled â€” the default build stays the lean blocking `ureq` h1 client.
tokio = { version = "1", default-features = false, features = ["rt", "rt-multi-thread", "net", "io-util", "time"], optional = true }
hyper = { version = "1", default-features = false, features = ["client", "http1", "http2"], optional = true }
hyper-util = { version = "0.1", default-features = false, features = ["tokio"], optional = true }
http-body-util = { version = "0.1", optional = true }
tokio-rustls = { version = "0.26", default-features = false, features = ["ring"], optional = true }
webpki-roots = { version = "1", optional = true }

[features]
# `compression` (auto `Content-Encoding` decode) ships on by default so a plain
# `get()` transparently decompresses, like `requests`; opt out with
# `default-features = false`.
default = ["compression"]
# Enabling `compression` turns on the gzip/zstd/snappy backends too, so a
# `Content-Encoding` response actually decodes.
compression = [
    "yggdryl-core/gzip",
    "yggdryl-core/zstd",
    "yggdryl-core/snappy",
]
media = ["yggdryl-core/media"]
# `serde` also turns on the core's `serde` feature, so the embedded value types
# (`Url`, `Method` strings, â€¦) serialise too. A live request/response body streams
# off a connection and is deliberately not serialisable.
serde = ["dep:serde", "yggdryl-core/serde"]
# `http2` wires the optional hyper/tokio async transport so an `HttpVersion::Http2`
# request (or `Auto` negotiating `h2` via TLS ALPN) actually speaks HTTP/2 â€” over
# TLS for `https`, or h2c (prior knowledge) for cleartext `http`. With it off,
# `HttpVersion::Http2` stays unavailable and pinning it errors (the lean default).
http2 = [
    "dep:tokio",
    "dep:hyper",
    # `server` is pulled in only so the hermetic h2c test can run a localhost
    # HTTP/2 server; the client library itself uses only hyper's client side.
    "hyper/server",
    "dep:hyper-util",
    "dep:http-body-util",
    "dep:tokio-rustls",
    "dep:webpki-roots",
]
# `http3` (HTTP/3 over QUIC) is still a reserved placeholder â€” recognised and
# selectable, but unavailable until its quinn-based transport lands.
http3 = []
log = ["dep:log", "yggdryl-core/log"]

[dev-dependencies]
# Round-trip the `serde` impls through a concrete format in the tests.
serde_json = { version = "1" }

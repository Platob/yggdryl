[package]
name = "yggdryl-schema"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
description = "Schema types for yggdryl: a DataType (primitive / logical / nested, tagged by a u8 DataTypeId) and a named, metadata-carrying Field"
keywords.workspace = true
readme = "README.md"

[lib]
name = "yggdryl_schema"
path = "src/lib.rs"

[dependencies]
# The consolidated core supplies the shared temporal vocabulary (`TimeUnit` /
# `Timezone`) the logical types reuse. Nothing else is pulled in.
yggdryl-core = { workspace = true, default-features = false }

[features]
default = []
